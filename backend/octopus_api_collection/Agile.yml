info:
  name: Agile
  type: http
  seq: 2

http:
  method: GET
  url: https://api.octopus.energy/v1/products/{{product}}/electricity-tariffs/{{tariff_code}}/standard-unit-rates/?period_from=2026-05-01T00:00:00Z&period_to=2026-05-01T23:59:59Z
  params:
    - name: period_from
      value: 2026-05-01T00:00:00Z
      type: query
    - name: period_to
      value: 2026-05-01T23:59:59Z
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Retrieves half-hourly standard unit rates for the given product and tariff code. Filter by period_from and period_to (ISO 8601).
