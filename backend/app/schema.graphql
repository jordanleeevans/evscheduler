scalar DateTime
scalar Percentage

type Vehicle {
  id: ID!
  name: String!
  batteryCapacityKwh: Float!
  currentBatteryPct: Percentage!
  createdAt: DateTime!
}

type ChargingSession {
  id: ID!
  vehicle: Vehicle!
  departureTime: DateTime!
  targetChargePct: Percentage!
  status: SessionStatus!
  slots: [ChargingSlot!]!
  createdAt: DateTime!
}

enum SessionStatus {
  PENDING
  SCHEDULED
  ACTIVE
  COMPLETED
  CANCELLED
}

type Tariff {
  id: ID!
  name: String!
  region: String!
  validFrom: DateTime!
  validTo: DateTime!
}

type ChargingSlot {
  id: ID!
  slotStart: DateTime!
  slotEnd: DateTime!
  pricePerKwh: Float!
  isSelected: Boolean!
}

type TariffPrice {
  slotStart: DateTime!
  slotEnd: DateTime!
  pricePerKwh: Float!
}

type Query {
  vehicles: [Vehicle!]!
  vehicle(id: ID!): Vehicle
  chargingSessions: [ChargingSession!]!
  chargingSession(id: ID!): ChargingSession
  tariffPrices(from: DateTime!, to: DateTime!, region: String): [TariffPrice!]!
}

type Mutation {
  createVehicle(name: String!, batteryCapacityKwh: Float!, currentBatteryPct: Percentage!): Vehicle!
  scheduleChargingSession(vehicleId: ID!, departureTime: DateTime!, targetChargePct: Percentage!): ChargingSession!
  cancelChargingSession(id: ID!): ChargingSession!
  updateBatteryLevel(vehicleId: ID!, currentBatteryPct: Percentage!): Vehicle!
}
